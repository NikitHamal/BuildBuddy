name: Android Release APK

on:
  push:

jobs:
  release-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"
          cache-read-only: false

      - name: Decode signing keystore
        if: ${{ secrets.BUILD_BUDDY_UPLOAD_STORE_B64 != '' }}
        shell: bash
        run: |
          echo "${{ secrets.BUILD_BUDDY_UPLOAD_STORE_B64 }}" | base64 --decode > /tmp/buildbuddy-upload.jks

      - name: Assemble signed release APK
        shell: bash
        env:
          BUILD_BUDDY_UPLOAD_STORE_FILE: /tmp/buildbuddy-upload.jks
          BUILD_BUDDY_UPLOAD_STORE_PASSWORD: ${{ secrets.BUILD_BUDDY_UPLOAD_STORE_PASSWORD }}
          BUILD_BUDDY_UPLOAD_KEY_ALIAS: ${{ secrets.BUILD_BUDDY_UPLOAD_KEY_ALIAS }}
          BUILD_BUDDY_UPLOAD_KEY_PASSWORD: ${{ secrets.BUILD_BUDDY_UPLOAD_KEY_PASSWORD }}
        run: |
          gradle --no-daemon --parallel :app:assembleRelease

      - name: Rename APK with commit hash
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "SHORT_SHA=$SHORT_SHA" >> "$GITHUB_ENV"
          APK_PATH="$(find app/build/outputs/apk/release -name '*.apk' | head -n 1)"
          cp "$APK_PATH" "BuildBuddy-${SHORT_SHA}-release.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BuildBuddy-${{ env.SHORT_SHA }}-release
          path: BuildBuddy-*-release.apk
          if-no-files-found: error
