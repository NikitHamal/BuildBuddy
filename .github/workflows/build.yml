name: Build Release APK

on:
  push:
    branches:
      - '**'

# Cancel in-progress workflows for the same branch to save resources
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g" -Dorg.gradle.parallel=true -Dorg.gradle.caching=true -Dkotlin.incremental=true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1  # Shallow clone for faster checkout

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle  # Built-in Gradle caching

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          gradle-home-cache-cleanup: true
          add-job-summary: on-failure

      - name: Generate Gradle Wrapper (if missing)
        run: |
          if [ ! -f "./gradlew" ]; then
            gradle wrapper
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease \
          --parallel \
          --build-cache \
          --configuration-cache \
          -Porg.gradle.workers.max=4 \
          -Pandroid.enableR8.fullMode=true
        env:
          GRADLE_OPTS: -Xmx4g -Dorg.gradle.parallel=true -Dorg.gradle.caching=true

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          mkdir -p app/build/outputs/apk/release/
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/BuildBuddy-${{ steps.sha.outputs.short }}-release.apk
          fi

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: BuildBuddy-${{ steps.sha.outputs.short }}-release
          path: app/build/outputs/apk/release/BuildBuddy-${{ steps.sha.outputs.short }}-release.apk
          retention-days: 30
          compression-level: 6
